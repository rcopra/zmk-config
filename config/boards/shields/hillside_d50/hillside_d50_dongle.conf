CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_CONN=7

CONFIG_ZMK_SLEEP=n

CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=6
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=3

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_DONGLE_SCREEN_FLIPPED=y
CONFIG_DONGLE_SCREEN_DEFAULT_BRIGHTNESS=50
CONFIG_DONGLE_SCREEN_SYSTEM_ICON=0

# Override PM_SOFT_OFF=y from hillside_d50.conf — soft-off is a battery
# feature for the halves, not the USB-powered dongle. Leaving it on
# pulls in PM_DEVICE + ZMK_PM_DEVICE_SUSPEND_RESUME, which suspends the
# ST7789v panel on idle. YADS controls the backlight but doesn't know
# how to resume the panel, so the screen turns off and never wakes up.
CONFIG_ZMK_PM_SOFT_OFF=n
CONFIG_PM_DEVICE=n

# Optional: explicit YADS screen-idle timeout. Default is 600s (10 min);
# set to 900 (15 min) per preference. Wake on keypress is built into YADS.
CONFIG_DONGLE_SCREEN_IDLE_TIMEOUT_S=900
