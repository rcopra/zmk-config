# Default user configuration settings

# ==== LED ====
# Backlight + underglow are off by default because the dongle build (XIAO BLE)
# doesn't have the LED hardware — enabling them globally fails the
# zmk,backlight chosen-node assertion. Enable per-half via a shield-scoped
# conf if/when you want the bare LED on the nice_nano halves.
#CONFIG_ZMK_BACKLIGHT=y
#CONFIG_ZMK_RGB_UNDERGLOW=y
#CONFIG_WS2812_STRIP=y


# ==== External Power ====
# Power for the display shouldn't be affected by any RGB on/off toggling.
# The D50 has a physical LED power switch to disconnect the LED if needed.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# ==== Display ====
# Configured for a nice view. Comment out if none. 
# CONFIG_ZMK_DISPLAY=y
# Display dedicated thread (optional)
#CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# ==== Soft-off ====  Triggered from the keymap
CONFIG_ZMK_PM_SOFT_OFF=y

# Bluetooth tweaks shared with temper.conf
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Required to re-pair when switching split topology (standalone ↔ dongle).
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
