manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: temper
      url-base: https://github.com/raeedcho

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: temper-zmk-config
      remote: temper
      revision: main

  self:
    path: config
