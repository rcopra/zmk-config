# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  - board: nice_nano_v2
    shield: temper_left nice_view_adapter nice_view
  - board: nice_nano_v2
    shield: temper_right nice_view_adapter nice_view
  - board: seeeduino_xiao_ble
    shield: temper_dongle dongle_screen
    artifact-name: temper_dongle

  - board: nice_nano_v2
    shield: temper_left_dongle nice_view_adapter nice_view
    artifact-name: temper_left_dongle
  - board: nice_nano_v2
    shield: temper_right_dongle nice_view_adapter nice_view
    artifact-name: temper_right_dongle

  - board: nice_nano_v2
    shield: hillside_d50_left nice_view
  - board: nice_nano_v2
    shield: hillside_d50_right nice_view
  - board: seeeduino_xiao_ble
    shield: hillside_d50_dongle dongle_screen
    artifact-name: hillside_d50_dongle

  - board: nice_nano_v2
    shield: hillside_d50_left_dongle nice_view
    artifact-name: hillside_d50_left_dongle
  - board: nice_nano_v2
    shield: hillside_d50_right_dongle nice_view
    artifact-name: hillside_d50_right_dongle

  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset_nice_nano_v2
  - board: seeeduino_xiao_ble
    shield: settings_reset
    artifact-name: settings_reset_xiao_ble
